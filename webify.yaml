# 腾讯云 Webify 配置文件
# 文档: https://cloud.tencent.com/document/product/1256

name: live-battle-room

# 框架类型
framework: nextjs

# 构建配置
build:
  # Node.js 版本
  nodeVersion: "18"
  
  # 构建命令
  command: npm run build
  
  # 输出目录
  output: .next

# 环境变量（敏感信息请在 Webify 控制台配置）
# 在 Webify 控制台 -> 应用设置 -> 环境变量 中添加：
# BAIDU_API_KEY=你的API Key
# BAIDU_SECRET_KEY=你的Secret Key
# COZE_BOT_ID=你的Bot ID
# COZE_TOKEN=你的Token

# 路由配置（Next.js 应用会自动处理）
routes:
  # 所有请求转发到 Next.js
  - src: /.*
    dest: /

# 忽略文件
ignore:
  - node_modules/**
  - .git/**
  - .env*
  - "*.log"
